<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: file:;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>角色配置编辑器</title>
    <link rel="stylesheet" href="../assets/styles/ui-theme.css">
    <style>
        body {
            padding: 24px;
        }

        .role-shell {
            max-width: 1280px;
            padding: 0;
        }

        .role-layout {
            display: grid;
            gap: 18px;
        }

        .hero-panel {
            display: grid;
            gap: 16px;
            padding: 28px;
        }

        .toolbar-card,
        .field-card,
        .editor-card,
        .notes-card {
            padding: 22px;
            border: 1px solid var(--vx-line-soft);
            border-radius: var(--vx-radius-lg);
            background: rgba(255, 255, 255, 0.92);
            box-shadow: 0 14px 28px rgba(24, 48, 69, 0.05);
        }

        .toolbar-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .char-nav,
        .field-nav {
            display: grid;
            align-items: center;
            gap: 10px;
        }

        .char-nav {
            flex: 1;
            grid-template-columns: auto minmax(0, 1fr) auto;
        }

        .field-nav {
            grid-template-columns: auto minmax(0, 1fr) auto;
        }

        .nav-status {
            min-height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 16px;
            border-radius: 18px;
            background: rgba(248, 251, 255, 0.92);
            border: 1px solid rgba(24, 48, 69, 0.08);
            color: var(--vx-ink-strong);
            font-family: var(--vx-font-display);
            font-size: 18px;
            text-align: center;
        }

        .field-card {
            display: grid;
            gap: 10px;
        }

        .field-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .editor-grid {
            display: grid;
            grid-template-columns: minmax(0, 1fr);
            gap: 18px;
        }

        .editor-card {
            display: grid;
            gap: 14px;
        }

        #curKeyLabel {
            display: block;
            color: var(--vx-ink-strong);
            font-size: 18px;
            font-weight: 700;
        }

        #jsonEditor {
            min-height: 560px;
            padding: 18px 20px;
            border-radius: 22px;
            border: 1px solid rgba(24, 48, 69, 0.12);
            background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
            color: var(--vx-ink-strong);
            font-family: Consolas, "Courier New", monospace;
            font-size: 14px;
            line-height: 1.7;
            resize: none;
        }

        .footer {
            display: flex;
            gap: 12px;
            padding: 0 28px 28px;
        }

        .footer #saveBtn {
            flex: 1;
        }

        .footer #deleteBtn {
            width: 160px;
        }

        @media (max-width: 980px) {
            .editor-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 720px) {
            body {
                padding: 16px;
            }

            .toolbar-card,
            .footer {
                flex-direction: column;
            }

            .char-nav,
            .field-nav {
                grid-template-columns: 1fr;
            }

            .footer #deleteBtn {
                width: 100%;
            }
        }
    </style>
</head>
<body class="workspace-body">
<div class="window-shell role-shell">
    <div class="glass-panel role-layout">
        <section class="hero-panel">
            <div class="hero-topline">Role Editor</div>
            <div>
                <h1 class="hero-title">角色配置编辑器</h1>
            </div>
        </section>

        <section class="toolbar-card">
            <div class="char-nav">
                <button id="prevChar" class="vx-btn secondary" type="button">上一个角色</button>
                <div id="charInfo" class="nav-status">加载中...</div>
                <button id="nextChar" class="vx-btn secondary" type="button">下一个角色</button>
            </div>
            <button id="addBtn" class="vx-btn primary" type="button">新增角色</button>
        </section>

        <section class="field-card">
            <div class="field-head">
                <div>
                    <div class="section-label">Field Navigation</div>
                </div>
                <span id="fieldInfo" class="pill">0 / 0</span>
            </div>
            <div class="field-nav">
                <button id="prevField" class="vx-btn ghost" type="button">上一个字段</button>
                <div class="nav-status">字段浏览</div>
                <button id="nextField" class="vx-btn ghost" type="button">下一个字段</button>
            </div>
        </section>

        <section class="editor-grid">
            <div class="editor-card">
                <label id="curKeyLabel" for="jsonEditor">当前字段</label>
                <textarea id="jsonEditor" spellcheck="false"></textarea>
            </div>
        </section>

        <div class="footer">
            <button id="saveBtn" class="vx-btn primary" type="button">保存当前角色修改</button>
            <button id="deleteBtn" class="vx-btn danger" type="button">删除角色</button>
        </div>
    </div>
</div>

<script src="../scripts/pages/role-config.js"></script>
</body>
</html>
