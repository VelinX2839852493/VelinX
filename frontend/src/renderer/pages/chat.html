<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: file:;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant</title>
    <link rel="stylesheet" href="../assets/styles/ui-theme.css">
    <style>
        html,
        body {
            height: 100%;
            overflow: hidden;
        }

        .chat-body {
            display: flex;
            min-height: 100vh;
        }

        .chat-shell {
            display: flex;
            width: 100%;
            align-items: stretch;
            min-height: calc(100vh - 16px);
            padding: 8px 10px;
        }

        #app {
            display: flex;
            width: 100%;
            height: 100%;
            min-height: 0;
            border-radius: 28px;
            overflow: hidden;
        }

        #left-section {
            flex: 1;
            min-width: 0;
            min-height: 0;
            display: flex;
            flex-direction: column;
            background:
                radial-gradient(circle at top left, rgba(20, 132, 142, 0.1), transparent 34%),
                linear-gradient(180deg, rgba(255, 255, 255, 0.88) 0%, rgba(246, 250, 255, 0.84) 100%);
        }

        #header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 10px 16px 8px;
            border-bottom: 1px solid rgba(24, 48, 69, 0.08);
            background: rgba(255, 255, 255, 0.56);
            backdrop-filter: blur(16px);
        }

        .header-copy {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .header-copy .hero-topline {
            margin-bottom: 0;
            padding: 5px 10px;
            font-size: 11px;
        }

        .header-copy strong {
            display: inline-block;
            margin-top: 0;
            color: var(--vx-ink-strong);
            font-family: var(--vx-font-display);
            font-size: 20px;
            line-height: 1;
        }

        .header-side {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 8px;
            min-width: 0;
            margin-left: auto;
        }

        #chat-container {
            flex: 1 1 auto;
            min-height: 0;
            padding: 10px 16px 6px;
            overflow-y: auto;
        }

        #chat-container:empty::before {
            content: "暂无消息";
            display: block;
            max-width: 240px;
            margin: 12px auto 0;
            padding: 12px 14px;
            border: 1px dashed rgba(24, 48, 69, 0.14);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.58);
            color: var(--vx-ink-soft);
            text-align: center;
            line-height: 1.5;
        }

        .message {
            max-width: min(78%, 620px);
            margin-bottom: 10px;
            padding: 10px 13px;
            border-radius: 18px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
            box-shadow: 0 16px 34px rgba(24, 48, 69, 0.08);
            animation: vx-rise 0.22s ease both;
        }

        .message.user {
            margin-left: auto;
            border-bottom-right-radius: 8px;
            background: linear-gradient(135deg, #14848e 0%, #0f6f78 100%);
            color: #ffffff;
        }

        .message.ai {
            border-bottom-left-radius: 8px;
            background: rgba(255, 255, 255, 0.96);
            color: var(--vx-ink-strong);
        }

        .message.system {
            max-width: 420px;
            margin: 10px auto;
            border-radius: 999px;
            background: rgba(255, 244, 231, 0.92);
            color: #8b5a1b;
            text-align: center;
            box-shadow: none;
        }

        #toolbar {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 10px;
            padding: 0;
            border-top: none;
            background: transparent;
        }

        .toolbar-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tool-btn,
        .side-btn,
        #sendBtn,
        .modal-btn {
            border: none;
            cursor: pointer;
            font: inherit;
        }

        .tool-btn {
            min-height: 34px;
            padding: 0 12px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.92);
            color: var(--vx-ink-strong);
            box-shadow: inset 0 0 0 1px rgba(24, 48, 69, 0.08);
            transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
        }

        .tool-btn:hover,
        .side-btn:hover,
        #sendBtn:hover,
        .modal-btn:hover {
            transform: translateY(-1px);
        }

        .tool-btn.active {
            color: #ffffff;
            background: linear-gradient(135deg, var(--vx-accent) 0%, #20a3af 100%);
            box-shadow: 0 14px 26px rgba(20, 132, 142, 0.22);
        }

        #input-area {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 8px 14px 12px;
            border-top: 1px solid rgba(24, 48, 69, 0.08);
            background: rgba(255, 255, 255, 0.82);
        }

        .composer-row {
            display: flex;
            align-items: stretch;
            gap: 10px;
            width: 100%;
        }

        .composer-card {
            flex: 1;
            min-width: 0;
            padding: 7px 10px;
            border: 1px solid rgba(24, 48, 69, 0.08);
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 10px 22px rgba(24, 48, 69, 0.05);
        }

        #msgInput {
            width: 100%;
            min-height: 40px;
            padding: 0 2px;
            border: none;
            background: transparent;
            color: var(--vx-ink-strong);
            font-size: 14px;
            outline: none;
        }

        #sendBtn {
            flex: 0 0 108px;
            min-width: 108px;
            min-height: 40px;
            padding: 0 16px;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--vx-highlight) 0%, #ff7a18 100%);
            color: #ffffff;
            font-size: 14px;
            font-weight: 800;
            box-shadow: 0 12px 24px rgba(255, 122, 24, 0.22);
        }

        .multimodal-toggle {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-height: 40px;
            padding: 0 12px;
            border: 1px solid rgba(24, 48, 69, 0.08);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 10px 22px rgba(24, 48, 69, 0.05);
            color: var(--vx-ink-strong);
            white-space: nowrap;
            user-select: none;
        }

        .multimodal-toggle input {
            width: 16px;
            height: 16px;
            margin: 0;
            accent-color: var(--vx-accent);
            cursor: pointer;
        }

        .multimodal-toggle span {
            font-size: 13px;
            font-weight: 700;
        }

        #side-panel {
            width: 0;
            overflow: hidden;
            transition: width 0.25s ease;
            border-left: 1px solid rgba(24, 48, 69, 0.08);
            background:
                linear-gradient(180deg, rgba(255, 252, 247, 0.94) 0%, rgba(249, 253, 255, 0.92) 100%);
        }

        #side-panel.open {
            width: 220px;
        }

        .panel-content {
            width: 220px;
            height: 100%;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .panel-head {
            padding: 2px 2px 6px;
        }

        .panel-head strong {
            display: block;
            margin-top: 2px;
            color: var(--vx-ink-strong);
            font-size: 18px;
            font-family: var(--vx-font-display);
        }

        .panel-title {
            color: var(--vx-accent-strong);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .side-btn {
            min-height: 46px;
            padding: 0 14px;
            justify-content: flex-start;
            border-radius: 14px;
            color: var(--vx-ink-strong);
            background: rgba(255, 255, 255, 0.92);
            box-shadow: inset 0 0 0 1px rgba(24, 48, 69, 0.08);
            text-align: left;
        }

        .side-btn[data-type="ext-api"] {
            color: var(--vx-danger);
            background: rgba(255, 255, 255, 0.88);
        }

        #modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 20;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(24, 48, 69, 0.26);
            backdrop-filter: blur(6px);
        }

        .modal-card {
            width: min(360px, calc(100vw - 32px));
            padding: 24px;
            border-radius: 26px;
            background: rgba(255, 255, 255, 0.96);
            box-shadow: var(--vx-shadow-strong);
        }

        .modal-card h3 {
            margin: 0;
            color: var(--vx-ink-strong);
            font-family: var(--vx-font-display);
            font-size: 24px;
        }

        .modal-card p {
            display: none;
            margin: 12px 0 20px;
            color: var(--vx-ink-soft);
            line-height: 1.7;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
        }

        .modal-btn {
            flex: 1;
            min-height: 46px;
            border-radius: 14px;
            font-weight: 800;
        }

        .modal-btn.secondary {
            background: rgba(24, 48, 69, 0.08);
            color: var(--vx-ink-strong);
        }

        .modal-btn.primary {
            background: linear-gradient(135deg, #d64545 0%, #f26f5c 100%);
            color: #ffffff;
        }

        @media (max-width: 860px) {
            #header,
            #input-area {
                flex-direction: column;
                align-items: stretch;
            }

            .header-side {
                align-items: flex-start;
                margin-left: 0;
            }

            .chat-shell {
                padding: 10px;
            }
        }

        @media (max-width: 640px) {
            .composer-row {
                flex-direction: column;
            }

            #sendBtn {
                width: 100%;
                min-width: 0;
            }
        }
    </style>
</head>
<body class="workspace-body chat-body">
<div class="window-shell chat-shell">
    <div id="app" class="glass-panel">
        <div id="left-section">
            <div id="header">
                <div class="header-copy">
                    <div class="hero-topline">Chat</div>
                    <strong>对话控制台</strong>
                </div>
                <div class="header-side">
                    <span class="pill"><span class="status-dot"></span> 会话已连接</span>
                </div>
            </div>

            <div id="chat-container" class="scroll-surface"></div>

            <div id="input-area">
                <div id="toolbar">
                    <div class="toolbar-group">
                        <button class="tool-btn" id="togglePanelBtn" type="button">展开功能</button>
                        <button class="tool-btn" id="clearBtn" type="button">清空历史</button>
                        <button class="tool-btn" type="button" disabled>偏好设置</button>
                    </div>
                </div>
                <div class="composer-row">
                    <div class="composer-card">
                        <input type="text" id="msgInput" placeholder="输入消息内容..." autocomplete="off">
                    </div>
                    <label class="multimodal-toggle" for="multimodalToggle" title="开启后发送消息时会附带当前桌面截图">
                        <input type="checkbox" id="multimodalToggle">
                        <span>是否开启多模态</span>
                    </label>
                    <label class="multimodal-toggle" for="multimodalToggle" title="开启后发送消息时会回复语音">
                        <input type="checkbox" id="tts">
                        <span>是否开启语音输出</span>
                    </label>
                    <button id="sendBtn" type="button">发送</button>
                </div>
            </div>
        </div>

        <div id="side-panel">
            <div class="panel-content">
                <div class="panel-head">
                    <div class="panel-title">Workspace Tools</div>
                    <strong>辅助面板</strong>
                </div>
                <button class="side-btn" data-type="char-info" type="button">角色信息面板</button>
                <button class="side-btn" data-type="switch-char" type="button">切换角色</button>
                <button class="side-btn" data-type="openai-config" type="button">api配置</button>
                <button class="side-btn" data-type="api-config" type="button">后端连接</button>
                <button class="side-btn" data-type="archive" type="button">导入 / 导出存档</button>
                <button class="side-btn" data-type="RoleConfigWindow" type="button">角色配置编辑器</button>
                <button class="side-btn" data-type="heart" type="button">心跳机制</button>
                <button class="side-btn" data-type="ext-api" type="button">实验性外部 API</button>
            </div>
        </div>
    </div>
</div>

<div id="modal-overlay">
    <div class="modal-card">
        <h3>清空聊天记录？</h3>
        <div class="modal-actions">
            <button class="modal-btn secondary" id="cancelClear" type="button">取消</button>
            <button class="modal-btn primary" id="confirmClear" type="button">确认清空</button>
        </div>
    </div>
</div>

<script src="../scripts/pages/chat.js"></script>
</body>
</html>
