<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: file:;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>角色信息</title>
    <link rel="stylesheet" href="../assets/styles/ui-theme.css">
    <style>
        body {
            padding: 24px;
        }

        .char-shell {
            padding: 0;
        }

        .page-stack {
            display: grid;
            gap: 18px;
        }

        .hero-panel {
            display: grid;
            gap: 16px;
            padding: 28px;
        }

        .dir-card,
        .status-card,
        .file-card {
            border: 1px solid var(--vx-line-soft);
            border-radius: var(--vx-radius-lg);
            background: rgba(255, 255, 255, 0.92);
            box-shadow: 0 14px 28px rgba(24, 48, 69, 0.05);
        }

        .dir-card,
        .status-card {
            padding: 18px 20px;
        }

        .dir-label {
            display: inline-block;
            margin-bottom: 10px;
            color: var(--vx-accent-strong);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        #char-info-dir {
            color: var(--vx-ink-strong);
            line-height: 1.7;
            word-break: break-all;
        }

        #char-info-list {
            display: grid;
            gap: 16px;
        }

        .file-card {
            padding: 20px;
        }

        .file-title {
            margin: 0;
            color: var(--vx-ink-strong);
            font-family: var(--vx-font-display);
            font-size: 22px;
        }

        .file-path {
            margin: 10px 0 16px;
            color: var(--vx-ink-soft);
            font-size: 12px;
            line-height: 1.7;
            word-break: break-all;
        }

        pre {
            margin: 0;
            padding: 18px;
            border-radius: 20px;
            background: linear-gradient(180deg, #162132 0%, #121b2a 100%);
            color: #dce8f6;
            overflow-x: auto;
            font-family: Consolas, "Courier New", monospace;
            font-size: 13px;
            line-height: 1.65;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.04);
        }

        .error-message,
        .info-message {
            padding: 16px 18px;
            border-radius: 16px;
            line-height: 1.7;
        }

        .error-message {
            background: rgba(214, 69, 69, 0.12);
            color: var(--vx-danger);
        }

        .info-message {
            background: rgba(20, 132, 142, 0.1);
            color: var(--vx-accent-strong);
        }
    </style>
</head>
<body class="workspace-body">
<main class="window-shell char-shell">
    <div class="glass-panel page-stack">
        <section class="hero-panel">
            <div class="hero-topline">Character Library</div>
            <div>
                <h1 class="hero-title">角色信息总览</h1>
            </div>
        </section>

        <section class="dir-card">
            <span class="dir-label">Config Directory</span>
            <div id="char-info-dir">加载中...</div>
        </section>

        <section class="status-card" id="char-info-status"></section>
        <section id="char-info-list"></section>
    </div>
</main>

<script src="../scripts/pages/char-info.js"></script>
</body>
</html>
